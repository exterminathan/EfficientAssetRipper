version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Collapse all action bumps into a single weekly PR / branch instead of
    # one branch per dependency.
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
