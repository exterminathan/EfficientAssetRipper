name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to read-only; jobs that need to write must opt in explicitly.
permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      # Force the Windows `py` launcher to pick the same Python that
      # actions/setup-python configured.  Without this, `py` uses the
      # newest registered version on the runner (currently 3.14) and
      # PySide6 ships no wheels for that.
      PY_PYTHON: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          # Forked PRs cannot write to the action cache, so requesting it
          # surfaces as a noisy warning.  Disable the cache for forks.
          cache: ${{ github.event.pull_request.head.repo.fork && '' || 'pip' }}

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "8.0.x"

      - name: Install Python dependencies
        run: |
          py -m pip install --upgrade pip
          py -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run fast test tiers
        # Same exclusion set as build.bat step [0b/5]
        run: py -m pytest -q -m "not slow and not requires_blender and not requires_everything and not requires_dotnet_cli" --maxfail=1

      - name: Run build pipeline
        # build.bat re-runs the test gate (cheap, mirrors local behaviour) and
        # then builds the EXE + ZIP via PyInstaller. The CI env var (set by
        # GitHub Actions) suppresses interactive `pause` calls.
        shell: cmd
        run: build.bat

      - name: Verify ZIP artifact exists and is non-empty
        shell: pwsh
        run: |
          $zip = "dist\EfficientAssetRipper-win-x64.zip"
          if (-not (Test-Path $zip)) { throw "ZIP not found at $zip" }
          $size = (Get-Item $zip).Length
          if ($size -lt 1MB) { throw "ZIP is suspiciously small: $size bytes" }
          Write-Host "OK: $zip is $($size / 1MB) MB"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: EAR-build-${{ github.sha }}
          path: dist/EfficientAssetRipper-win-x64.zip
          if-no-files-found: error
          retention-days: 14
